<!DOCTYPE html>
<html>
    <title>Login</title>

    <body style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px;">
        <h2>Iniciar Sesion</h2>
        
            <input type="text" placeholder="usuario" id="usuario"">
            <input type="password" placeholder="contraseña" id ="contraseña">
            <button onclick="login()">Entrar</button>
     
        <p id="mensaje"></p>

        <script>
            function login(){
                let usuario = document.getElementById("usuario").value;
                let contraseña = document.getElementById("contraseña").value;

                let usuarioGuardado = "admin";
                let contraseñaGuardada = "1234";

                if(usuario === usuarioGuardado && contraseña === contraseñaGuardada){                    
                    window.location.href = "calculadora.html";
                }else{
                     document.getElementById("mensaje").textContent = "Usuario y contraseña incorrecta"; 
                }

                

                document.getElementById("usuario").value = "";
                document.getElementById("contraseña").value = "";
            }
        </script>
    </body>


</html>
